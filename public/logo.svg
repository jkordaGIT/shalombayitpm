<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- Background -->
  <rect width="320" height="180" fill="#F7F3EE"/>

  <!-- Arch icon — centred at x=130 (icon 60 wide, centre 160, so x=130) -->
  <g transform="translate(130, 6)">
    <rect width="60" height="70" fill="#5C6B3A"/>
    <path d="M12,70 L12,40 A18,18 0 0,1 48,40 L48,70 Z" fill="#F7F3EE"/>
    <path d="M17,70 L17,44 A13,13 0 0,1 43,44 L43,70"
          fill="none" stroke="#5C6B3A" stroke-width="1.2" stroke-opacity="0.28"/>
    <line x1="30" y1="23" x2="30" y2="31"
          stroke="#5C6B3A" stroke-width="1.2" stroke-opacity="0.28"/>
  </g>

  <!-- "Shalom Bayit" wordmark -->
  <text x="160" y="112"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="400"
        fill="#5C6B3A" text-anchor="middle" letter-spacing="0.5">
    Shalom Bayit
  </text>

  <!-- "PROPERTY MANAGEMENT" subtitle -->
  <text x="160" y="138"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="400"
        fill="#5C6B3A" text-anchor="middle" letter-spacing="4.5">
    PROPERTY MANAGEMENT
  </text>
</svg>
